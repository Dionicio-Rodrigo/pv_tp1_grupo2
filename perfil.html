  <body>
    <header>
      <h1>Sinergia Educativa</h1>

    <nav>

      <a href="perfil.html" class="navact">Mi Perfil</a>
    </nav>

    <main>
      <section id="seccion-perfil">
        <h2>Mi Perfil</h2>

        <article id="perfil-martin">
          <header id="encabezado-perfil">
            <img src="assets/profilepic.png" alt="Perfil" width="100" />
            <div>
              <h3>Martinandez2</h3>
              <p>Alumno</p>

          <section id="informacion-personal">
            <h4>Información Personal</h4>
            <form>
              <label>Nombre Completo:</label>
              <input
                type="text"
                class="entrada-texto"
                value="Martin Fernandez"
              />

              <label>DNI:</label>
              <input type="text" class="entrada-texto" value="46.369.852" />

              <label>Correo:</label>
              <input
                type="email"
                class="entrada-texto"
                value="martin.fernandez@unju.edu.ar"
              />

              <button type="button" class="boton-enviar">
                Actualizar Perfil
              </button>
            </form>
          </section>

          <section id="nuevo-mensaje">
            <h4>Nuevo Mensaje</h4>
            <form>
              <label>Asunto:</label>
              <input type="text" class="entrada-texto" />

              <label>Mensaje:</label>
              <textarea class="area-mensaje"></textarea>
              <button type="button" class="boton-enviar">Enviar Mensaje</button>
            </form>
          </section>
        </article>
      </section>
    </main>

    <footer>
